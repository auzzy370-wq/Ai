<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ai Chat</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f1115;
        --panel: #171a21;
        --border: #2a2f3a;
        --text: #e8ecf1;
        --muted: #9aa4b2;
        --accent: #5b8cff;
        --user: #1f2937;
        --assistant: #111827;
        --mock: #f59e0b;
        --live: #22c55e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, sans-serif;
        background: radial-gradient(circle at top, #1a2233, var(--bg) 45%);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .app {
        width: min(720px, 100%);
        height: min(80vh, 760px);
        background: color-mix(in srgb, var(--panel) 92%, transparent);
        border: 1px solid var(--border);
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }

      header {
        padding: 20px 24px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-start;
      }

      header h1 {
        margin: 0;
        font-size: 1.25rem;
      }

      header p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .status-pill {
        font-size: 0.75rem;
        font-weight: 600;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        white-space: nowrap;
      }

      .status-pill.mock {
        color: var(--mock);
      }

      .status-pill.openai {
        color: var(--live);
      }

      .toolbar {
        display: flex;
        justify-content: flex-end;
        padding: 10px 20px 0;
      }

      .toolbar button {
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        border-radius: 10px;
        padding: 6px 12px;
        cursor: pointer;
        font: inherit;
        font-size: 0.85rem;
      }

      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 12px 24px 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .message {
        max-width: 85%;
        padding: 12px 14px;
        border-radius: 14px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .message.user {
        align-self: flex-end;
        background: var(--user);
        border: 1px solid var(--border);
      }

      .message.assistant {
        align-self: flex-start;
        background: var(--assistant);
        border: 1px solid var(--border);
      }

      .message .meta {
        display: block;
        margin-top: 8px;
        font-size: 0.75rem;
        color: var(--muted);
      }

      form {
        display: flex;
        gap: 12px;
        padding: 16px 20px 20px;
        border-top: 1px solid var(--border);
      }

      input,
      button {
        font: inherit;
      }

      input {
        flex: 1;
        border: 1px solid var(--border);
        background: #0b0d12;
        color: var(--text);
        border-radius: 12px;
        padding: 12px 14px;
      }

      input:focus {
        outline: 2px solid color-mix(in srgb, var(--accent) 50%, transparent);
        border-color: var(--accent);
      }

      button[type="submit"] {
        border: none;
        background: var(--accent);
        color: white;
        border-radius: 12px;
        padding: 0 18px;
        cursor: pointer;
        font-weight: 600;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header>
        <div>
          <h1>Ai Chat</h1>
          <p>Multi-turn chat with conversation history.</p>
        </div>
        <span id="status-pill" class="status-pill mock">loading...</span>
      </header>
      <div class="toolbar">
        <button type="button" id="clear-button">Clear chat</button>
      </div>
      <div id="messages" aria-live="polite"></div>
      <form id="chat-form">
        <input
          id="message-input"
          type="text"
          placeholder="Type a message..."
          autocomplete="off"
          required
        />
        <button type="submit" id="send-button">Send</button>
      </form>
    </main>
    <script>
      const STORAGE_KEY = "ai-chat-history";
      const messagesEl = document.getElementById("messages");
      const form = document.getElementById("chat-form");
      const input = document.getElementById("message-input");
      const sendButton = document.getElementById("send-button");
      const clearButton = document.getElementById("clear-button");
      const statusPill = document.getElementById("status-pill");

      let history = [];

      function saveHistory() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
      }

      function loadHistory() {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          return saved ? JSON.parse(saved) : [];
        } catch {
          return [];
        }
      }

      function renderHistory() {
        messagesEl.innerHTML = "";
        if (history.length === 0) {
          addMessage("assistant", "Hi! Send a message to try multi-turn chat.");
          return;
        }

        for (const item of history) {
          addMessage(item.role, item.content, item.meta || "");
        }
      }

      function addMessage(role, text, meta = "") {
        const el = document.createElement("div");
        el.className = `message ${role}`;
        el.textContent = text;
        if (meta) {
          const metaEl = document.createElement("span");
          metaEl.className = "meta";
          metaEl.textContent = meta;
          el.appendChild(metaEl);
        }
        messagesEl.appendChild(el);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      async function loadStatus() {
        try {
          const response = await fetch("/api/status");
          const data = await response.json();
          statusPill.textContent = `${data.mode} · ${data.model}`;
          statusPill.className = `status-pill ${data.mode}`;
        } catch {
          statusPill.textContent = "offline";
          statusPill.className = "status-pill mock";
        }
      }

      clearButton.addEventListener("click", () => {
        history = [];
        saveHistory();
        renderHistory();
        input.focus();
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const message = input.value.trim();
        if (!message) return;

        const requestHistory = history.map(({ role, content }) => ({ role, content }));
        history.push({ role: "user", content: message });
        saveHistory();
        renderHistory();
        input.value = "";
        sendButton.disabled = true;

        try {
          const response = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message, history: requestHistory }),
          });

          if (!response.ok) {
            throw new Error(`Request failed with status ${response.status}`);
          }

          const data = await response.json();
          history.push({
            role: "assistant",
            content: data.reply,
            meta: `model: ${data.model}`,
          });
          saveHistory();
          renderHistory();
        } catch (error) {
          history.push({ role: "assistant", content: `Error: ${error.message}` });
          saveHistory();
          renderHistory();
        } finally {
          sendButton.disabled = false;
          input.focus();
        }
      });

      history = loadHistory();
      renderHistory();
      loadStatus();
    </script>
  </body>
</html>
