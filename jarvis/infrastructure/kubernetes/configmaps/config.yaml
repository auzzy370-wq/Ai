apiVersion: v1
kind: Namespace
metadata:
  name: jarvis
  labels:
    name: jarvis

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: jarvis-config
  namespace: jarvis
data:
  api-url: "https://jarvis.yourdomain.com"
  ws-url: "wss://jarvis.yourdomain.com"
  environment: "production"
  log-level: "info"
  max-agents: "14"
  memory-consolidation-interval: "300"

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jarvis-backend
  namespace: jarvis
